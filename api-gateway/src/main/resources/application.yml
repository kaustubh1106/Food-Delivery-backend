server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: ${spring.application.name}
        prefer-ip-address: true
        register-health-check: false
        instance-id: ${spring.application.name}-${random.value}
    gateway:
      # Auto-register routes for all Consul services (lowercase service name)
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      # Explicit routes (more control)
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/restaurants/**, /api/menu-items/**

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/delivery-partners/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**

# Logging (helpful for debugging routes)
logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
