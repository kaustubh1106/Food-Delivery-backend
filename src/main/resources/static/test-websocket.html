<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Location Test</title>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; }
        #log { background: #111; color: #0f0; padding: 15px; height: 300px; overflow-y: scroll; }
    </style>
</head>
<body>
    <h2>Live Location Tracker - Partner ID: <input id="partnerId" value="1" size="3"></h2>
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
    <hr>
    <div id="log"></div>

    <script>
        var stompClient = null;

        function log(msg) {
            var div = document.getElementById('log');
            div.innerHTML += new Date().toLocaleTimeString() + ' - ' + msg + '<br>';
            div.scrollTop = div.scrollHeight;
        }

        function connect() {
            var partnerId = document.getElementById('partnerId').value;
            var socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function () {
                log('Connected! Listening for Partner ' + partnerId + ' location...');
                stompClient.subscribe('/topic/location/' + partnerId, function (message) {
                    var location = JSON.parse(message.body);
                    log('Location: lat=' + location.latitude + ', lng=' + location.longitude);
                });
            });
        }

        function disconnect() {
            if (stompClient) stompClient.disconnect();
            log('Disconnected');
        }
    </script>
</body>
</html>
</script>
</body>
</html>
